<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <style>
      .ink   { fill: #1B1B2A; }
      .sub   { fill: #5B5B72; }
      .brand { fill: #1B1BD1; }
      .white { fill: #FFFFFF; }
      .mono  { font-family: 'SFMono-Regular', 'JetBrains Mono', Menlo, Consolas, monospace; }
      .h     { font-weight: 700; }
      .stageFill  { fill: #FFFFFF; stroke: #C9CEF0; stroke-width: 1.5; }
      .railFill   { fill: #FFFFFF; stroke: #C9CEF0; stroke-width: 1.5; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1B1BD1"/>
    </marker>
    <marker id="arrowGrey" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#8A6FE8"/>
    </marker>
  </defs>

  <!-- ===== platform hosts ===== -->
  <g>
    <rect x="150" y="34" width="410" height="64" rx="14" fill="#1B1BD1"/>
    <text x="355" y="63" text-anchor="middle" class="white h" font-size="19">androidApp</text>
    <text x="355" y="85" text-anchor="middle" class="white mono" font-size="13" opacity="0.9">MainActivity → setContent { App() }</text>

    <rect x="640" y="34" width="410" height="64" rx="14" fill="#1B1BD1"/>
    <text x="845" y="63" text-anchor="middle" class="white h" font-size="19">iosApp</text>
    <text x="845" y="85" text-anchor="middle" class="white mono" font-size="13" opacity="0.9">MainViewController() → App()</text>
  </g>
  <path d="M355,98 L355,150" stroke="#1B1BD1" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M845,98 L845,150" stroke="#1B1BD1" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- ===== shared container ===== -->
  <rect x="40" y="150" width="1120" height="720" rx="22" fill="#EEF0FB" stroke="#C9CEF0" stroke-width="1.5"/>
  <text x="66" y="185" class="brand h" font-size="17">:shared</text>
  <text x="134" y="185" class="sub" font-size="14">— one Compose Multiplatform codebase (commonMain · UI included), identical on Android &amp; iOS</text>

  <!-- pipeline label -->
  <text x="70" y="222" class="sub h" font-size="12" letter-spacing="1.5">DATA PIPELINE</text>
  <!-- cross-cutting label -->
  <text x="770" y="222" class="sub h" font-size="12" letter-spacing="1.5">CROSS-CUTTING</text>

  <!-- ===== pipeline stages (left column) ===== -->
  <!-- S1 pdf -->
  <g>
    <rect x="70" y="234" width="640" height="96" rx="14" class="stageFill"/>
    <text x="92" y="266" class="ink h mono" font-size="17">pdf/</text>
    <text x="92" y="292" class="ink" font-size="14.5">Extract every character + bounding box, rebuild visual lines &amp; columns.</text>
    <text x="92" y="313" class="sub" font-size="13">extractPdfText · LayoutText</text>
    <rect x="536" y="248" width="152" height="26" rx="13" fill="#F4E7DE" stroke="#E8562A" stroke-width="1.2"/>
    <text x="612" y="266" text-anchor="middle" fill="#B23C15" class="h" font-size="11.5" letter-spacing="0.5">PLATFORM SEAM</text>
    <text x="612" y="313" text-anchor="middle" class="sub mono" font-size="12">pdfium · PDFKit</text>
  </g>

  <!-- S2 statement -->
  <g>
    <rect x="70" y="356" width="640" height="96" rx="14" class="stageFill"/>
    <text x="92" y="388" class="ink h mono" font-size="17">statement/</text>
    <text x="92" y="414" class="ink" font-size="14.5">Infer the layout per document — no per-bank parsers.</text>
    <text x="92" y="435" class="sub" font-size="13">Tokens → ProfileDetector → reconcile balances → GenericParser</text>
  </g>

  <!-- S3 model + data -->
  <g>
    <rect x="70" y="478" width="640" height="96" rx="14" class="stageFill"/>
    <text x="92" y="510" class="ink h mono" font-size="17">model/  ·  data/</text>
    <text x="92" y="536" class="ink" font-size="14.5">The transaction, and where it lives.</text>
    <text x="92" y="557" class="sub" font-size="13">Transaction · closed Category enum · Room + bundled SQLite</text>
  </g>

  <!-- S4 insights -->
  <g>
    <rect x="70" y="600" width="640" height="96" rx="14" class="stageFill"/>
    <text x="92" y="632" class="ink h mono" font-size="17">insights/</text>
    <text x="92" y="658" class="ink" font-size="14.5">Every figure the app states, computed once — pure &amp; UI-free.</text>
    <text x="92" y="679" class="sub" font-size="13">Categorizer · Insights · WrappedStory  (unit-tested, imports no Compose)</text>
  </g>

  <!-- S5 UI -->
  <g>
    <rect x="70" y="722" width="640" height="96" rx="14" class="stageFill"/>
    <text x="92" y="754" class="ink h mono" font-size="17">UI — Compose, shared</text>
    <text x="92" y="780" class="ink" font-size="14.5">Screens both platforms render from the same source.</text>
    <text x="92" y="801" class="sub" font-size="13">transactions/ · review/ · chat/ · wrapped/ · onboarding/</text>
  </g>

  <!-- pipeline arrows -->
  <path d="M390,330 L390,354" stroke="#1B1BD1" stroke-width="2.5" fill="none" marker-end="url(#arrow)"/>
  <path d="M390,452 L390,476" stroke="#1B1BD1" stroke-width="2.5" fill="none" marker-end="url(#arrow)"/>
  <path d="M390,574 L390,598" stroke="#1B1BD1" stroke-width="2.5" fill="none" marker-end="url(#arrow)"/>
  <path d="M390,696 L390,720" stroke="#1B1BD1" stroke-width="2.5" fill="none" marker-end="url(#arrow)"/>

  <!-- ===== cross-cutting rail (right column) ===== -->
  <!-- llm (tall, important) -->
  <g>
    <rect x="748" y="234" width="386" height="150" rx="14" fill="#1B1BD1"/>
    <text x="770" y="266" class="white h mono" font-size="17">llm/</text>
    <text x="770" y="292" class="white" font-size="14">One llama.cpp engine (via Llamatik) —</text>
    <text x="770" y="312" class="white" font-size="14">the same native code on both platforms.</text>
    <text x="770" y="336" class="white" font-size="13" opacity="0.85">App-scoped, generation calls serialised.</text>
    <rect x="770" y="348" width="176" height="24" rx="12" fill="#FFFFFF" opacity="0.16"/>
    <text x="782" y="365" class="white" font-size="12" opacity="0.95">SEAM: model storage path</text>
  </g>

  <!-- di -->
  <g>
    <rect x="748" y="400" width="386" height="66" rx="14" class="railFill"/>
    <text x="770" y="430" class="ink h mono" font-size="15">di/</text>
    <text x="812" y="430" class="ink" font-size="14">Koin — started from the platform entry point</text>
    <text x="770" y="452" class="sub" font-size="12.5">(not a Compose scope, so rotation can't reload the model)</text>
  </g>

  <!-- navigation -->
  <g>
    <rect x="748" y="482" width="386" height="60" rx="14" class="railFill"/>
    <text x="770" y="512" class="ink h mono" font-size="15">navigation/</text>
    <text x="880" y="512" class="ink" font-size="14">Type-safe routes; two tabs +</text>
    <text x="770" y="532" class="sub" font-size="12.5">routeless tasks (import · wrapped · setup)</text>
  </g>

  <!-- theme -->
  <g>
    <rect x="748" y="558" width="386" height="60" rx="14" class="railFill"/>
    <text x="770" y="588" class="ink h mono" font-size="15">ui/theme/</text>
    <text x="862" y="588" class="ink" font-size="14">Hand-built brand palette</text>
    <text x="770" y="608" class="sub" font-size="12.5">Material 3 the system, not its colours · #1B1BD1</text>
  </g>

  <!-- quality gates -->
  <g>
    <rect x="748" y="634" width="386" height="184" rx="14" fill="#F5F6FE" stroke="#C9CEF0" stroke-width="1.5"/>
    <text x="770" y="664" class="sub h" font-size="12" letter-spacing="1.5">QUALITY GATES  ·  on `check`</text>
    <text x="770" y="694" class="ink h" font-size="14">detekt</text>
    <text x="828" y="694" class="sub" font-size="13">— no baseline, zero findings</text>
    <text x="770" y="720" class="ink h" font-size="14">Konsist</text>
    <text x="838" y="720" class="sub" font-size="13">— architecture rules the</text>
    <text x="770" y="740" class="sub" font-size="13">compiler can't see, mutation-verified:</text>
    <text x="782" y="762" class="sub" font-size="12.5">• no per-bank branches</text>
    <text x="782" y="781" class="sub" font-size="12.5">• the expect seam stays narrow</text>
    <text x="782" y="800" class="sub" font-size="12.5">• insights/ &amp; statement/ import no Compose</text>
  </g>

  <!-- dashed "bus": the one engine feeds three stages (statement, insights, chat) -->
  <g stroke="#8A6FE8" stroke-width="2" fill="none" stroke-dasharray="5 5" opacity="0.95">
    <!-- drop out of the llm box, run down the gutter -->
    <path d="M741,384 L741,404 L729,404 L729,770"/>
    <!-- stubs into the stages that call the engine -->
    <path d="M729,404 L714,404" marker-end="url(#arrowGrey)"/>
    <path d="M729,648 L714,648" marker-end="url(#arrowGrey)"/>
    <path d="M729,770 L714,770" marker-end="url(#arrowGrey)"/>
  </g>
  <g fill="#7A5FD8" font-size="10.5" text-anchor="end">
    <text x="726" y="401">LlmProfiler</text>
    <text x="726" y="645">Categorizer</text>
    <text x="726" y="767">chat · PromptBuilder</text>
  </g>
</svg>
